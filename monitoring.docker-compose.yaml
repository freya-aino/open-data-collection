name: "monitoring"

networks:
  monitoring-network:
    driver: bridge

services:
  mlflow:
    # TODO - use a dedicated postgres database instead of maindb
    image: ghcr.io/mlflow/mlflow:${MLFLOW_VERSION}
    networks: 
      - monitoring-network
    container_name: monitoring-mlflow
    depends_on:
      monitoring-pg:
        condition: service_healthy
    env_file:
      - ./monitoring.env
    ports:
      - "${MLFLOW_PORT}:9090"
    command:
      - /bin/bash
      - -c
      - |
        pip install --no-cache-dir psycopg2-binary
        mlflow server \
          --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@monitoring-pg:5432/${POSTGRES_DB} \
          --host ${MLFLOW_HOST} \
          --port 9090
      # install boto3 and add flags when using artifacts

  monitoring-pg:
    image: postgres:${POSTGRES_VERSION}
    container_name: monitoring-pg
    networks:
      - monitoring-network
    env_file:
      - ./monitoring.env # todo replace with 
    # volumes: # todo
    #   - monitoring-pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

