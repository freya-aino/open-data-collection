
networks:
  openwebui-network:
    driver: bridge

services:
  openwebui-postgres:
    container_name: openwebui-pg
    image: postgres:15
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # volumes:
    #   - ./data/postgres-data-new:/var/lib/postgresql
    networks:
      - openwebui-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval:  10s
      timeout: 5s
      retries: 10
  openwebui:
    image:  ghcr.io/open-webui/open-webui:latest
    container_name: openwebui-webui
    # env_file:
    #   - .env
    ports:
      - "${OPENWEBUI_PORT:9090}"
    environment:

      # - OLLAMA_API_BASE_URL=http://ollama:11434

      # - PIPELINES_URL=${PIPELINES_URL:-http://openwebui-pipelines:9099}
      # - PIPELINES_URLS=http://openwebui-pipelines:9099
      # - PIPELINES_API_KEY=${PIPELINES_API_KEY}

      # Session Secret (für Cookies/JWT)
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}

      # PostgreSQL-Connection-String
      - DATABASE_URL=postgresql://{POSTGRES_USER}:${POSTGRES_PASSWORD}@openwebui-postgres:5432/${POSTGRES_DB}

    depends_on:
      - openwebui-postgres
      # - ollama
      # - openwebui-pipelines
    # volumes:
    #   - openwebui-data:/app/backend/data
    networks:
      - openwebui-network
