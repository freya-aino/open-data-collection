# ------------------------------------ INITIALIZATION ------------------------------------

  rustfs-create-bucket:
    image: minio/mc:${MINIO_MC_VERSION}
    networks: [document-network]
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set rustfs http://${RUSTFS_CONTAINER_NAME}:${RUSTFS_PORT} "${RUSTFS_ACCESS_KEY}" "${RUSTFS_SECRET_KEY}"
        mc mb --ignore-existing "rustfs/${MLFLOW_ARTIFACT_S3_BUCKET}"
        mc mb --ignore-existing "rustfs/${DOCUMENT_S3_BUCKET}"
    restart: "no"

