name: "data-backend"

# dgraph
# key value storage
# time series database
# garage S3

services:
  postgres:
    image: postgres:12
    container_name: ${POSTGRES_CONTAINER_NAME}
    networks: [document-network]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      
    # volumes:
    #   - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION}
    networks: [document-network]
    container_name: qdrant
    # ports:
    #   - "${QDRANT_PORT}:6333"
    # volumes:
    #   - qdrant_data:/qdrant/
  rustfs:
    image: rustfs/rustfs:${RUSTFS_VERSION}
    container_name: ${RUSTFS_CONTAINER_NAME}
    networks: [document-network]
    ports:
      # - "${RUSTFS_PORT}:${RUSTFS_PORT}"
      - "${RUSTFS_CONSOLE_PORT}:${RUSTFS_CONSOLE_PORT}"
    # volumes:
    #   - rustfs_data:/data
    #   - rustfs_logs:/app/logs
    # (missing) tls cert mount
    environment:
      RUSTFS_ADDRESS: ${RUSTFS_HOST}:${RUSTFS_PORT}
      RUSTFS_CONSOLE_ADDRESS: ${RUSTFS_HOST}:${RUSTFS_CONSOLE_PORT}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE}

      # - RUSTFS_VOLUMES=/data/rustfs{0..3} # Define 4 storage volumes

      # - RUSTFS_SERVER_DOMAINS

      # - RUSTFS_CORS_ALLOWED_ORIGINS=*
      # - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*

      # - RUSTFS_OBS_LOGGER_LEVEL=info
      # - RUSTFS_OBS_ENDPOINT=http://otel-collector:4317

      # - RUSTFS_TLS_PATH=/opt/tls
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://localhost:${RUSTFS_PORT}/health && curl -f http://localhost:${RUSTFS_CONSOLE_PORT}/rustfs/console/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

